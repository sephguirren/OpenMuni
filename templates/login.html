<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Open Municipality System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background-color: #f3f3f3; /* Light gray from your screenshot */
            border-radius: 12px;
            padding: 40px 50px;
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            font-weight: 800;
            text-align: center;
            margin-bottom: 35px;
            font-size: 1.4rem;
            color: #000;
        }
        .form-label {
            font-weight: 700;
            font-size: 0.75rem;
            margin-bottom: 5px;
            color: #000;
        }
        .form-control {
            background-color: transparent;
            border: 1px solid #000;
            border-radius: 8px;
            padding: 8px 12px;
        }
        .form-control:focus {
            background-color: transparent;
            border-color: #000;
            box-shadow: 0 0 0 0.1rem rgba(0,0,0,0.25);
        }
        .btn-login {
            background-color: #000;
            color: #fff;
            border-radius: 20px;
            padding: 8px 30px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 20px;
        }
        .btn-login:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-title">
            Open Municipality<br>System
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger p-2 text-center" style="font-size: 0.85rem;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">USERNAME</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">PASSWORD</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-login w-50">LOGIN</button>
            </div>
        </form>
    </div>

</body>
</html>
